name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Events API image
        run: docker build -t events-api .

      - name: Run Events API container
        run: |
          docker run -d --name events-api-container -p 5000:5000 events-api
          sleep 10

      - name: Health check
        run: curl --fail http://localhost:5000/api/health

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest -v

      - name: Stop container
        if: always()
        run: docker stop events-api-container

      - name: Remove container
        if: always()
        run: docker rm events-api-container