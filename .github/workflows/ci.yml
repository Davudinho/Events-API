name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Events API image
        run: docker build -t events-api .

      - name: Run Events API container
        run: |
          docker run -d --name events-api-container -p 5000:5000 events-api
          sleep 10

      - name: Health check
        run: curl --fail http://localhost:5000/api/health